<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Lumen3D viewer</title>
  <style>
    html, body { margin: 0; height: 100%; background: #111; }
    canvas { display: block; }
    #hud {
      position: fixed; bottom: 10px; left: 12px;
      font: 13px/1.4 system-ui, sans-serif; color: #888;
      user-select: none; pointer-events: none;
    }
    #bar {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px; align-items: center;
      font: 14px system-ui, sans-serif;
    }
    #q {
      width: 320px; padding: 9px 12px; border-radius: 8px;
      border: 1px solid #444; background: #1c1c1c; color: #eee; outline: none;
    }
    #q:focus { border-color: #ffe14d; }
    #go {
      padding: 9px 16px; border-radius: 8px; border: none; cursor: pointer;
      background: #ffe14d; color: #111; font-weight: 600;
    }
    #status {
      position: fixed; top: 56px; left: 50%; transform: translateX(-50%);
      font: 13px system-ui, sans-serif; color: #ffe14d; min-height: 16px;
    }
    /* full-screen overlay shown until the point cloud finishes downloading */
    #loader {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column; gap: 16px;
      align-items: center; justify-content: center;
      background: #111; color: #eee;
      font: 15px system-ui, sans-serif;
      transition: opacity 0.4s ease;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    #spinner {
      width: 34px; height: 34px; border-radius: 50%;
      border: 3px solid #333; border-top-color: #ffe14d;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loadpct { color: #ffe14d; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <div id="loader">
    <div id="spinner"></div>
    <div>Loading scene… <span id="loadpct">0%</span></div>
  </div>
  <div id="bar">
    <input id="q" type="text" autocomplete="off"
           placeholder="Search the scene…  e.g. a wooden chair" />
    <button id="go">Find</button>
  </div>
  <div id="status"></div>
  <div id="hud">Lumen3D — drag to orbit · scroll to zoom · right-drag to pan</div>

  <!-- import map: resolves `three` to a CDN URL, so no npm / build step is needed -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { PLYLoader } from "three/addons/loaders/PLYLoader.js";

    // ── the big three ────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(
      60, window.innerWidth / window.innerHeight, 0.01, 5000
    );

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // mouse-drag orbit / scroll-zoom / right-drag pan
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;   // gentle inertia

    // module-level handles the query logic needs later
    let backdropMaterial = null;   // the full-room cloud's material (to dim it)
    let highlight = null;          // the currently lit-up object (one at a time)
    let sceneRadius = 1;           // used to scale highlight dot size

    // ── load our point cloud ─────────────────────────────────────────
    const loaderEl = document.getElementById("loader");
    const loadpctEl = document.getElementById("loadpct");

    const loader = new PLYLoader();
    loader.load(
      "scene.ply",
      (geometry) => {
        // DA3 (computer-vision convention) has Y pointing DOWN; three.js has Y
        // pointing UP. Negate Y so the room isn't rendered upside-down.
        geometry.scale(1, -1, 1);

        geometry.computeBoundingSphere();
        const { center, radius } = geometry.boundingSphere;
        sceneRadius = radius;

        // PLY carries per-point colors -> tell the material to use them.
        backdropMaterial = new THREE.PointsMaterial({
          size: radius * 0.008,    // bigger dots so surfaces read as solid
          vertexColors: true,
          sizeAttenuation: true,
          transparent: true,        // so we can dim it when something is highlighted
          opacity: 1.0,
        });

        const cloud = new THREE.Points(geometry, backdropMaterial);
        scene.add(cloud);

        // frame the camera on the cloud, and orbit around its center
        controls.target.copy(center);
        camera.position.set(center.x, center.y, center.z + radius * 3);
        camera.near = radius * 0.01;
        camera.far = radius * 100;
        camera.updateProjectionMatrix();
        controls.update();

        // cloud is on screen — fade the overlay out (then remove from layout)
        loaderEl.classList.add("hidden");
        setTimeout(() => { loaderEl.style.display = "none"; }, 450);
      },
      // onProgress: FastAPI sends Content-Length, so we get a real percentage;
      // if the total is unknown, fall back to showing MB downloaded.
      (evt) => {
        if (evt.lengthComputable && evt.total) {
          loadpctEl.textContent = Math.round((evt.loaded / evt.total) * 100) + "%";
        } else {
          loadpctEl.textContent = (evt.loaded / 1e6).toFixed(1) + " MB";
        }
      },
      (err) => {
        console.error("Failed to load scene.ply:", err);
        loaderEl.innerHTML =
          '<div style="color:#ff6b6b">Failed to load the scene. Try refreshing.</div>';
      }
    );

    // ── query: text -> /query -> light up the matched object ─────────
    const statusEl = document.getElementById("status");
    const inputEl = document.getElementById("q");

    function clearHighlight() {
      if (highlight) {
        scene.remove(highlight);
        highlight.geometry.dispose();
        highlight.material.dispose();
        highlight = null;
      }
      if (backdropMaterial) backdropMaterial.opacity = 1.0;
    }

    async function runQuery(text) {
      text = text.trim();
      if (!text) return;
      statusEl.textContent = "searching…";

      let data;
      try {
        const res = await fetch("/query", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });
        data = await res.json();
      } catch (e) {
        statusEl.textContent = "server error — is the FastAPI server running?";
        return;
      }

      const match = data.results && data.results[0];
      if (!match) { statusEl.textContent = "no match"; return; }

      clearHighlight();
      backdropMaterial.opacity = 0.25;   // ghost the room so the match pops

      // build a bright point cloud from the matched object's points.
      // (Y-flip to match the backdrop's flip above.)
      const pts = match.points;
      const positions = new Float32Array(pts.length * 3);
      for (let i = 0; i < pts.length; i++) {
        positions[3 * i]     = pts[i][0];
        positions[3 * i + 1] = -pts[i][1];
        positions[3 * i + 2] = pts[i][2];
      }
      const geom = new THREE.BufferGeometry();
      geom.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      const mat = new THREE.PointsMaterial({
        color: 0xffe14d,                 // bright yellow
        size: sceneRadius * 0.016,       // ~2x the backdrop dots, so it pops
        sizeAttenuation: true,
      });
      highlight = new THREE.Points(geom, mat);
      scene.add(highlight);

      statusEl.textContent =
        `match: object #${match.mask_id} · score ${match.score.toFixed(3)} · ${pts.length} points`;
    }

    document.getElementById("go").addEventListener("click", () => runQuery(inputEl.value));
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") runQuery(inputEl.value);
      if (e.key === "Escape") { inputEl.value = ""; clearHighlight(); statusEl.textContent = ""; }
    });

    // ── keep the canvas matched to the window ────────────────────────
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── render loop: redraw every frame so orbiting animates ─────────
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
